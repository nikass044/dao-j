# Turn on logging, and set ZMK logging to debug output
# CONFIG_ZMK_USB_LOGGING=y

# Increase transmit power level
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable pointing device support for mouse functionality
CONFIG_ZMK_POINTING=y

# Increase behavior queue size to 256 (fix macro issues when used with large macros)
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=256

# Increase leader max keys per sequence
CONFIG_ZMK_LEADER_MAX_KEYS_PER_SEQUENCE=8